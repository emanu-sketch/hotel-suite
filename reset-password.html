<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HotelSuite | Reset Password</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .reset-container {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .logo-box {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #2b9bbf, #1c6e8f);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }
        .logo-box i { font-size: 1.6rem; color: white; }
        h2 { text-align: center; font-family: 'Playfair Display', serif; color: #1e293b; margin-bottom: 0.5rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.3rem; font-weight: 600; font-size: 0.8rem; }
        input {
            width: 100%;
            padding: 0.7rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            font-size: 0.85rem;
        }
        input:focus { outline: none; border-color: #2b9bbf; }
        .btn {
            width: 100%;
            padding: 0.7rem;
            background: linear-gradient(135deg, #2b9bbf, #1c6e8f);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:hover { transform: translateY(-2px); }
        .error { color: #ef4444; font-size: 0.75rem; text-align: center; margin-top: 1rem; }
        .success { color: #10b981; font-size: 0.75rem; text-align: center; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="logo-box"><i class="bi bi-gem"></i></div>
        <h2>Reset Password</h2>
        <p style="text-align: center; color: #64748b; margin-bottom: 1.5rem;">Enter your new password</p>
        
        <div class="form-group">
            <label>New Password</label>
            <input type="password" id="newPassword" placeholder="Enter new password">
        </div>
        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Confirm new password">
        </div>
        
        <button class="btn" onclick="resetPassword()">Reset Password</button>
        <div id="message"></div>
        
        <p style="text-align: center; margin-top: 1rem;">
            <a href="login.html" style="color: #2b9bbf;">Back to Login</a>
        </p>
    </div>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (!token) {
            document.getElementById('message').innerHTML = '<div class="error">Invalid reset link. Please request a new one.</div>';
        }
        
        async function resetPassword() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('message');
            
            if (!newPassword || !confirmPassword) {
                messageDiv.innerHTML = '<div class="error">Please fill both fields</div>';
                return;
            }
            
            if (newPassword !== confirmPassword) {
                messageDiv.innerHTML = '<div class="error">Passwords do not match</div>';
                return;
            }
            
            if (newPassword.length < 6) {
                messageDiv.innerHTML = '<div class="error">Password must be at least 6 characters</div>';
                return;
            }
            
            try {
                const res = await fetch("/reset-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token, newPassword })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    messageDiv.innerHTML = '<div class="success">Password reset successful! Redirecting to login...</div>';
                    setTimeout(() => {
                        window.location.href = "login.html?reset=true";
                    }, 2000);
                } else {
                    messageDiv.innerHTML = `<div class="error">${data.error || "Reset failed"}</div>`;
                }
            } catch (err) {
                messageDiv.innerHTML = '<div class="error">Network error. Please try again.</div>';
            }
        }
    </script>
</body>
</html>
