<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customers - HotelSuite</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .add-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            border: 1px solid var(--border);
        }
        .top-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1.5rem;
        }
        .theme-switch {
            background: var(--bg-card);
            border: 1px solid var(--border);
            width: 42px;
            height: 42px;
            border-radius: 12px;
            cursor: pointer;
            color: var(--primary);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }
        .theme-switch:hover {
            background: var(--primary);
            color: white;
            transform: rotate(15deg);
        }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="sidebar-brand" onclick="toggleSidebar()">
        <div class="logo-box"><i class="bi bi-building"></i></div>
        <span class="brand-name">HotelSuite</span>
        <i class="bi bi-list ms-auto" id="toggleIcon" style="margin-left: auto;"></i>
    </div>
    
    <nav class="nav-menu">
        <a href="index.html" class="nav-item">
            <i class="bi bi-speedometer2"></i> <span>Dashboard</span>
        </a>
        <a href="rooms.html" class="nav-item">
            <i class="bi bi-door-open"></i> <span>Rooms</span>
        </a>
        <a href="bookings.html" class="nav-item">
            <i class="bi bi-calendar-check"></i> <span>Bookings</span>
        </a>
        <a href="customers.html" class="nav-item active">
            <i class="bi bi-people"></i> <span>Customers</span>
        </a>
        <!-- Manager Portal Link - shows only for managers -->
        <div id="managerPortalLink" style="display: none;">
            <a href="manager.html" class="nav-item">
                <i class="bi bi-shield-lock"></i> <span>Manager Portal</span>
            </a>
        </div>
        <div style="margin-top: 2rem;">
            <button onclick="logout()" class="nav-item" style="width: 100%; text-align: left; background: none; border: none; cursor: pointer;">
                <i class="bi bi-box-arrow-right"></i> <span>Logout</span>
            </button>
        </div>
    </nav>
</div>

<div class="main-content">
    <div class="view-container">
        <div class="top-bar">
            <button class="theme-switch" onclick="toggleTheme()">
                <i id="themeIcon" class="bi bi-moon-stars-fill"></i>
            </button>
        </div>

        <div class="page-header">
            <h1><i class="bi bi-people"></i> Customer Management</h1>
            <button class="add-btn" onclick="document.getElementById('addModal').style.display='flex'">
                <i class="bi bi-plus-lg"></i> Add Customer
            </button>
        </div>

        <p style="margin-bottom: 1rem; color: var(--text-muted);">Customers who register through the user portal appear here automatically.</p>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Linked User</th>
                    </tr>
                </thead>
                <tbody id="customerTable"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Add Customer Modal -->
<div id="addModal" class="modal">
    <div class="modal-content">
        <h2 style="margin-bottom: 1.5rem;">Add New Customer</h2>
        <form id="customerForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="customerNameInput" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="customerPhoneInput" placeholder="+1 234 567 8900" required>
            </div>
            <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                <button type="submit" class="btn btn-primary">Add Customer</button>
                <button type="button" class="btn" onclick="document.getElementById('addModal').style.display='none'" style="background: var(--bg);">Cancel</button>
            </div>
        </form>
    </div>
</div>

<script defer src="app.js"></script>
<script>
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        sidebar.classList.toggle('collapsed');
    }

    function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        
        const icon = document.getElementById('themeIcon');
        if (newTheme === 'dark') {
            icon.classList.remove('bi-sun-fill');
            icon.classList.add('bi-moon-stars-fill');
        } else {
            icon.classList.remove('bi-moon-stars-fill');
            icon.classList.add('bi-sun-fill');
        }
    }
    
    // Load saved theme on page load
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    const icon = document.getElementById('themeIcon');
    if (icon) {
        if (savedTheme === 'dark') {
            icon.classList.remove('bi-sun-fill');
            icon.classList.add('bi-moon-stars-fill');
        } else {
            icon.classList.remove('bi-moon-stars-fill');
            icon.classList.add('bi-sun-fill');
        }
    }

    // Check if user is manager (NOT admin) to show manager portal link
    fetch("/me", { credentials: "include" })
    .then(res => res.json())
    .then(user => {
        if (user && user.role === "manager") {
            const managerLink = document.getElementById("managerPortalLink");
            if (managerLink) managerLink.style.display = "block";
        }
    });
</script>
</body>
</html>
