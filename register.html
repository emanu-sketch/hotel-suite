<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HotelSuite | Create Account</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.pexels.com/photos/258154/pexels-photo-258154.jpeg?auto=compress&cs=tinysrgb&w=1600') center/cover no-repeat;
            opacity: 0.2;
            z-index: 0;
        }

        .auth-container {
            position: relative;
            z-index: 2;
            max-width: 450px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 1.5rem;
            padding: 1.8rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .logo {
            text-align: center;
            margin-bottom: 1.2rem;
        }

        .logo-box {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #2b9bbf, #1c6e8f);
            border-radius: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.6rem;
            box-shadow: 0 5px 15px -3px rgba(43, 155, 191, 0.3);
        }

        .logo-box i {
            font-size: 1.6rem;
            color: white;
        }

        h2 {
            text-align: center;
            font-family: 'Playfair Display', serif;
            color: #1e293b;
            font-size: 1.5rem;
            margin-bottom: 0.2rem;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 1.2rem;
            font-size: 0.75rem;
        }

        .form-group {
            margin-bottom: 0.8rem;
        }

        .form-group label {
            display: block;
            color: #334155;
            margin-bottom: 0.3rem;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i:first-child {
            position: absolute;
            left: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 0.85rem;
        }

        .input-wrapper input {
            width: 100%;
            padding: 0.65rem 0.8rem 0.65rem 2rem;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            color: #1e293b;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #2b9bbf;
            box-shadow: 0 0 0 3px rgba(43, 155, 191, 0.1);
            background: white;
        }

        .toggle-password {
            position: absolute;
            right: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #94a3b8;
        }

        .toggle-password:hover {
            color: #2b9bbf;
        }

        .password-strength {
            margin-top: 0.3rem;
        }

        .strength-bar {
            height: 2px;
            background: #e2e8f0;
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-fill {
            width: 0%;
            height: 100%;
            transition: width 0.2s ease;
        }

        .strength-text {
            font-size: 0.6rem;
            margin-top: 0.2rem;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: #64748b;
            font-size: 0.7rem;
            cursor: pointer;
            margin: 0.8rem 0;
        }

        .checkbox-label input {
            width: 14px;
            height: 14px;
            cursor: pointer;
            accent-color: #2b9bbf;
        }

        .checkbox-label a {
            color: #2b9bbf;
            text-decoration: none;
        }

        .btn {
            width: 100%;
            padding: 0.7rem;
            background: linear-gradient(135deg, #2b9bbf, #1c6e8f);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px -5px rgba(43, 155, 191, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 1rem 0;
            color: #94a3b8;
            font-size: 0.65rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }

        .divider span {
            margin: 0 0.8rem;
        }

        .social-login {
            display: flex;
            gap: 0.8rem;
        }

        .social-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            padding: 0.55rem;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            color: #475569;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .social-btn:hover {
            background: white;
            border-color: #2b9bbf;
            transform: translateY(-2px);
        }

        .error {
            color: #ef4444;
            font-size: 0.7rem;
            text-align: center;
            margin-top: 0.8rem;
            padding: 0.4rem;
            background: #fef2f2;
            border-radius: 0.5rem;
            display: none;
        }

        .success {
            color: #10b981;
            font-size: 0.7rem;
            text-align: center;
            margin-top: 0.8rem;
            padding: 0.4rem;
            background: #ecfdf5;
            border-radius: 0.5rem;
            display: none;
        }

        .footer {
            text-align: center;
            margin-top: 1rem;
            color: #64748b;
            font-size: 0.7rem;
        }

        .footer a {
            color: #2b9bbf;
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <div class="logo-box">
                <i class="bi bi-gem"></i>
            </div>
            <h2>Join HotelSuite</h2>
            <p class="subtitle">Create your account in seconds</p>
        </div>
        
        <form id="registerForm">
            <div class="form-group">
                <label>Full Name (Optional)</label>
                <div class="input-wrapper">
                    <i class="bi bi-person"></i>
                    <input type="text" id="fullname" placeholder="John Doe">
                </div>
            </div>
            
            <div class="form-group">
                <label>Username *</label>
                <div class="input-wrapper">
                    <i class="bi bi-at"></i>
                    <input type="text" id="username" placeholder="Choose a username" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Email Address *</label>
                <div class="input-wrapper">
                    <i class="bi bi-envelope"></i>
                    <input type="email" id="email" placeholder="john@example.com" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Password *</label>
                <div class="input-wrapper">
                    <i class="bi bi-lock"></i>
                    <input type="password" id="password" placeholder="Create a strong password" required>
                    <i class="bi bi-eye-slash toggle-password" id="togglePassword"></i>
                </div>
                <div class="password-strength">
                    <div class="strength-bar">
                        <div class="strength-fill" id="strengthFill"></div>
                    </div>
                    <div class="strength-text" id="strengthText"></div>
                </div>
            </div>
            
            <div class="form-group">
                <label>Confirm Password *</label>
                <div class="input-wrapper">
                    <i class="bi bi-lock-fill"></i>
                    <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                </div>
            </div>
            
            <label class="checkbox-label">
                <input type="checkbox" id="termsCheckbox"> I agree to the <a href="#">Terms</a> and <a href="#">Privacy Policy</a>
            </label>
            
            <button type="submit" class="btn" id="registerBtn">
                <i class="bi bi-person-plus"></i> Create Account
            </button>
            
            <div id="error" class="error"></div>
            <div id="success" class="success"></div>
        </form>
        
        <div class="divider">
            <span>Or sign up with</span>
        </div>
        
        <div class="social-login">
            <div class="social-btn" id="googleRegisterBtn">
                <i class="bi bi-google"></i> Google
            </div>
            <div class="social-btn" id="facebookRegisterBtn">
                <i class="bi bi-facebook"></i> Facebook
            </div>
        </div>
        
        <div class="footer">
            Already have an account? <a href="login.html">Sign in</a>
        </div>
    </div>

    <script>
        // Toggle password visibility
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('bi-eye');
            this.classList.toggle('bi-eye-slash');
        });
        
        // Password strength checker
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');
        
        passwordInput.addEventListener('input', function() {
            const password = this.value;
            let strength = 0;
            
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            
            const percentages = {0: 0, 1: 20, 2: 40, 3: 60, 4: 80, 5: 100};
            const colors = {0: '#ef4444', 1: '#ef4444', 2: '#f59e0b', 3: '#f59e0b', 4: '#10b981', 5: '#10b981'};
            const texts = {0: 'Very Weak', 1: 'Weak', 2: 'Fair', 3: 'Good', 4: 'Strong', 5: 'Very Strong'};
            
            strengthFill.style.width = percentages[strength] + '%';
            strengthFill.style.background = colors[strength];
            strengthText.textContent = texts[strength];
            strengthText.style.color = colors[strength];
        });
        
        function showMessage(type, text) {
            const errorDiv = document.getElementById('error');
            const successDiv = document.getElementById('success');
            
            if (type === 'error') {
                errorDiv.style.display = 'block';
                errorDiv.textContent = text;
                successDiv.style.display = 'none';
            } else {
                successDiv.style.display = 'block';
                successDiv.textContent = text;
                errorDiv.style.display = 'none';
            }
            
            setTimeout(() => {
                errorDiv.style.display = 'none';
                successDiv.style.display = 'none';
            }, 5000);
        }
        
        const form = document.getElementById("registerForm");
        const btn = document.getElementById("registerBtn");
        
        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const fullname = document.getElementById("fullname").value.trim();
            const username = document.getElementById("username").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;
            const termsChecked = document.getElementById("termsCheckbox").checked;
            
            if (!username || !email || !password) {
                showMessage('error', "Please fill in all required fields (*)");
                return;
            }
            
            if (!email.includes('@') || !email.includes('.')) {
                showMessage('error', "Please enter a valid email address");
                return;
            }
            
            if (password !== confirmPassword) {
                showMessage('error', "Passwords do not match");
                return;
            }
            
            if (password.length < 6) {
                showMessage('error', "Password must be at least 6 characters long");
                return;
            }
            
            if (!termsChecked) {
                showMessage('error', "Please agree to the Terms of Service");
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Creating account...';
            
            try {
                const res = await fetch("/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include",
                    body: JSON.stringify({ 
                        username, 
                        password, 
                        email,
                        fullname: fullname || username
                    })
                });
                
                const data = await res.json();
                
                if (!res.ok) {
                    showMessage('error', data.error || "Registration failed");
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-person-plus"></i> Create Account';
                    return;
                }
                
                showMessage('success', "Account created successfully! Redirecting to login...");
                
                setTimeout(() => {
                    window.location.href = "login.html?registered=true";
                }, 2000);
                
            } catch (err) {
                console.error("Registration error:", err);
                showMessage('error', "Network error. Please try again.");
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-person-plus"></i> Create Account';
            }
        });
        
        // Social registration
        document.getElementById('googleRegisterBtn').addEventListener('click', () => {
            showMessage('success', "Google sign-up coming soon! Use email registration for now.", 3000);
        });
        
        document.getElementById('facebookRegisterBtn').addEventListener('click', () => {
            showMessage('success', "Facebook sign-up coming soon! Use email registration for now.", 3000);
        });
    </script>
</body>
</html>
